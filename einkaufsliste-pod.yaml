apiVersion: v1
kind: Pod
metadata:
  name: mein-pod
  labels:
    app: web
spec:
  containers:
  - name: nginx-container
    image: nginx
    ports:
    - containerPort: 80
    volumeMounts:
    - name: html-volume
      mountPath: /usr/share/nginx/html 
  volumes:
  - name: html-volume
    configMap:
      name: einkaufsliste-http
