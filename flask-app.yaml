apiVersion: v1
kind: Pod
metadata:
  name: flask-app
  labels:
    app: flask
spec:
  containers:
  - name: flask-container
    image: einkaufsliste-flask:latest   
    imagePullPolicy: Never             
    ports:
    - containerPort: 5000
    env:
    - name: DB_HOST
      value: "postgres-service"
    - name: DB_NAME
      value: "einkaufsliste"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASS
      value: "postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  selector:
    app: flask
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30080