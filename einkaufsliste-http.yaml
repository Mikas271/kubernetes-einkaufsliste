apiVersion: v1
kind: ConfigMap
metadata:
  name: einkaufsliste-http
data:
  index.html: |
    <html lang="en">
      <head>
        <meta charset="UTF-8">
        <title>Einkaufsliste</title>
        <script>
          function addItem(){
            const input = document.getElementById("item");
            const list = document.getElementById("einkaufsListe");
            if (input.value.trim() !== ""){
              const li = document.createElement("li");
              li.textContent = input.value;
              // Delete-Button
              const btn = document.createElement("button");
              btn.textContent = "Delete";
              btn.onclick = function() {
                list.removeChild(li);
              };
              li.appendChild(btn);
              list.appendChild(li);
              input.value = "";
            }
          }
        </script>
      </head>
      <body>
        <h1><u>Einkaufsliste</u></h1>
        <input id="item" name="listaddField" placeholder="Add Item...">
        <button type="button" onClick="addItem()">Add Item</button>
        <ul id="einkaufsListe">
          <li>Bread <button onclick="this.parentElement.remove()">Delete</button></li>
          <li>Milk <button onclick="this.parentElement.remove()">Delete</button></li>
          <li>Eggs <button onclick="this.parentElement.remove()">Delete</button></li>
        </ul>
      </body>
    </html>
